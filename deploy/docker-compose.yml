# Portable single-service compose. Scale horizontally with:  docker compose up --scale web=3
# (put a reverse proxy / load balancer in front; the app is stateless, state is in the volume
#  — swap the SQLite volume for managed Postgres/Redis when you outgrow one node).
services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: antimg-web
    ports:
      - "${PORT:-8000}:8000"
    environment:
      WEB_CONCURRENCY: "${WEB_CONCURRENCY:-4}"
      ANTIMG_CORS_ORIGINS: "${ANTIMG_CORS_ORIGINS:-*}"
      ANTIMG_WEBHOOK_SECRET: "${ANTIMG_WEBHOOK_SECRET:-}"   # set to enable TradingView webhook
      ANTIMG_DEFAULT_START: "${ANTIMG_DEFAULT_START:-2005-01-01}"
    volumes:
      - antimg-data:/data
    restart: unless-stopped

volumes:
  antimg-data:
